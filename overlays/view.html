<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오버레이 미리보기</title>
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/ui.css" />
  <style>
    .phone { overflow: hidden; }
    .proto-bg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      border: none; pointer-events: none;
      transform-origin: top left;
    }
    .proto-dim {
      position: absolute; inset: 0;
      background: rgba(0, 0, 0, 0.15);
      pointer-events: none; z-index: 1;
    }
    #toss-ui-root { z-index: 100; }
  </style>
</head>
<body class="proto-overlay">
  <div class="phone" id="app">
    <iframe id="proto-bg" class="proto-bg" title="배경 화면"></iframe>
    <div class="proto-dim" aria-hidden="true"></div>
  </div>

  <script src="../js/icons.js"></script>
  <script src="../js/ui.js"></script>
  <script>
    initOverlayFromQuery();
  </script>
</body>
</html>
